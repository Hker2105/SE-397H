<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đặt hàng</title>
    <link rel="stylesheet" href="/Asset/Css/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <header class="header">
        <div class="logo">G5 LAPTOP</div>

        <div class="search-box">
            <input type="text" placeholder="Tìm Kiếm Sản Phẩm">
            <button><i class="fa fa-search"></i></button>
        </div>

        <div class="header-icons">
            <div class="icon"><i class="fa fa-heart"></i> <span>0</span></div>
            <div class="icon"><i class="fa fa-shopping-cart"></i> <span>0</span></div>
        </div>
    </header>

    <nav class="navbar">
        <div class="dropdown">
            <button class="dropbtn">Danh mục sản phẩm <i class="fa fa-caret-down"></i></button>
        </div>

        <ul>
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Sản phẩm</a></li>
            <li><a href="#">Giỏ hàng</a></li>
            <li><a href="#">Tài khoản <i class="fa fa-caret-down"></i></a></li>
            <li><a href="#">Quản lí lịch sử đơn hàng</a></li>
        </ul>

        <div class="out-right">
            Thoát
            <div class="icon-exit"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
        </div>
    </nav>

    <!-- ORDER -->
    <section class="order-header">
        <h1>ĐẶT HÀNG</h1>
        <p><a href="#">Trang chủ</a> - Đặt hàng</p>
    </section>

    <section class="order-container">

        <div class="order-left">
            <h2>Thông tin người đặt hàng</h2>

            <div class="order-grid">
                <div>
                    <input type="text" placeholder="Họ và tên">
                </div>

                <div>
                    <input type="text" placeholder="Số điện thoại">
                </div>

                <div>
                    <input type="email" placeholder="Email">
                </div>

                <div>
                    <input type="text" placeholder="Địa chỉ">
                </div>

                <div style="grid-column: span 2;">
                    <input type="text" placeholder="Ghi chú">
                </div>
            </div>
        </div>

        <div class="order-right">
            <div class="invoice-box">
                <div class="invoice-title">Tổng hóa đơn</div>

                <div class="invoice-item invoice-line">
                    <strong>Sản phẩm</strong>
                </div>

                <div class="invoice-item">
                    <strong>Thành tiền</strong>
                </div>

                <div class="invoice-item">
                    <strong>Phí vận chuyển</strong>
                </div>

                <div class="invoice-item">
                    <strong>Chọn phương thức thanh toán <i class="fa fa-caret-down"></i></strong>
                </div>

                <button class="order-btn">Đặt Hàng</button>
            </div>
        </div>

    </section>
    <script src="/Asset/BackEnd/oder.js"></script>
</body>

</html>
