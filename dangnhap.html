<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập</title>
    <link rel="stylesheet" href="styledangnhap.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="dangnhap.html" class="active">Đăng nhập</a>
            <a href="dangky.html">Đăng ký</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="login-container">
            <h2>ĐĂNG NHẬP</h2>
            
            <form action="#">
                <div class="input-group">
                    <input type="text" placeholder="Nhập tên đăng nhập" required>
                </div>
                
                <div class="input-group">
                    <input type="password" placeholder="Nhập mật khẩu" required>
                </div>
                
                <div class="captcha-group">
                    <input type="text" placeholder="Mã xác nhận" required>
                    <div class="captcha-box">Mã Capcha</div>
                </div>
                
                <div class="remember-me">
                    <input type="checkbox" id="remember">
                    <label for="remember">Nhớ đăng nhập lần sau</label>
                </div>
                
                <button type="submit" class="btn-login">Đăng nhập</button>
                
                <div class="register-link">
                    <a href="dangky.html">Tạo tài khoản mới</a>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
