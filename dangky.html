<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký</title>
    <link rel="stylesheet" href="styledangky.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-links">
            <a href="dangnhap.html">Đăng nhập</a>
            <a href="dangky.html" class="active">Đăng ký</a>
        </div>
    </nav>

    <main class="main-content">
        <div class="register-container">
            <h2>Đăng Ký</h2>
            
            <form action="#">
                <div class="form-group">
                    <label>Tên Đăng Nhập</label>
                    <input type="text" placeholder="Nhập tên đăng nhập..." required>
                </div>

                <div class="form-group">
                    <label>Họ Tên</label>
                    <input type="text" placeholder="Nhập họ tên" required>
                </div>

                <div class="form-group">
                    <label>SĐT</label>
                    <input type="tel" placeholder="Nhập SĐT..." required>
                </div>

                <div class="form-group address-group">
                    <label>Địa chỉ</label>
                    <input type="text" placeholder="Nhập Đường/Thôn..." required>
                    <input type="text" placeholder="Nhập Phường/Xã..." required>
                    <input type="text" placeholder="Nhập Quận/Huyện..." required>
                    <input type="text" placeholder="Nhập Tỉnh/Thành phố..." required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" placeholder="Nhập Email..." required>
                </div>

                <div class="form-group gender-group">
                    <label>Giới Tính</label>
                    <div class="radio-options">
                        <input type="radio" id="nam" name="gender" value="nam">
                        <label for="nam" class="radio-label">Nam</label>
                        
                        <input type="radio" id="nu" name="gender" value="nu">
                        <label for="nu" class="radio-label">Nữ</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" placeholder="Nhập Mật khẩu" required>
                </div>

                <div class="form-group">
                    <label>Nhập lại mật khẩu</label>
                    <input type="password" placeholder="Nhập lại mật khẩu" required>
                </div>

                <button type="submit" class="btn-register">Đăng ký</button>
            </form>
        </div>
    </main>

</body>
</html>
