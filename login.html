<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G5 Laptop - Đăng Nhập</title>
    <link rel="stylesheet" href="/Asset/Css/Style.css">
</head>

<body>
    <div class="login-page">

        <div class="login-box">
            <h1 class="login-title">ĐĂNG NHẬP</h1>

            <div class="login-input-group">
                <input type="text" placeholder="Nhập tên đăng nhập" maxlength="8">
            </div>

            <div class="login-input-group">
                <input type="password" placeholder="Nhập mật khẩu">
            </div>

            <div class="login-captcha-group">
                <input type="text" placeholder="Mã xác nhận">
                <button class="login-captcha-btn">of2</button>
            </div>

            <div class="login-remember-group">
                <input type="checkbox" id="remember">
                <label for="remember">Nhớ đăng nhập lần sau</label>
            </div>

            <button class="login-btn">Đăng nhập</button>

            <div class="login-create-account">Tạo tài khoản mới</div>
        </div>
    </div>
    <script src="/Asset/BackEnd/login.js"></script>
</body>

</html>
