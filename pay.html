<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G5 Laptop - Pay</title>
    <link rel="stylesheet" href="/Asset/Css/Style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="logo">G5 LAPTOP</div>

        <div class="search-box">
            <input type="text" placeholder="Tìm Kiếm Sản Phẩm">
            <button><i class="fa fa-search"></i></button>
        </div>

        <div class="header-icons">
            <div class="icon"><i class="fa fa-heart"></i> <span>0</span></div>
            <div class="icon"><i class="fa fa-shopping-cart"></i> <span>0</span></div>
        </div>
    </header>

    <!-- NAV BAR -->
    <nav class="navbar">
        <div class="dropdown">
            <button class="dropbtn">Danh mục sản phẩm <i class="fa fa-caret-down"></i></button>
        </div>

        <ul>
            <li><a href="#">Trang chủ</a></li>
            <li><a href="#">Sản phẩm</a></li>
            <li><a href="#">Giỏ hàng</a></li>
            <li><a href="#">Tài khoản <i class="fa fa-caret-down"></i></a></li>
            <li><a href="#">Quản lí lịch sử đơn hàng</a></li>
        </ul>

        <div class="out-right">
            Thoát
            <div class="icon-exit"><i class="fa-solid fa-arrow-right-from-bracket"></i></div>
        </div>
    </nav>

    <div class="pay-header">
        <h1>Phương thức thanh toán</h1>
    </div>

    <div class="pay-wrapper">

        <div class="pay-container">

            <!-- LEFT -->
            <div class="pay-left">

                <div class="pay-box">

                    <label class="pay-item">
                        <input type="radio" name="pay">
                        <div>
                            <strong>1. Thanh toán khi nhận hàng (COD)</strong>
                            <p>Kiểm tra và thanh toán khi nhận hàng</p>
                        </div>
                    </label>

                    <label class="pay-item">
                        <input type="radio" name="pay">

                        <div>
                            <strong>2. Chuyển khoản ngân hàng</strong>

                            <div>
                                <div class="pay-bank">
                                    <img src="/Asset/img/QRbank.jpg" alt="QR Bank">

                                    <div>
                                        <p>TP Bank</p>
                                        <p>STK: 0766 3603 401</p>
                                        <p>Chủ TK: Công Ty G5 LAPTOP</p>
                                        <p>Quét mã để thanh toán nhanh. Tự động xác nhận</p>
                                    </div>

                                </div>
                            </div>
                        </div>

                    </label>

                    <label class="pay-item">
                        <input type="radio" name="pay">

                        <div class="pay-content">
                            <div class="pay-wallet">
                                <strong>3. Ví điện tử (Momo/ZaloPay)</strong>
                                <div class="pay-icons">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a0/MoMo_Logo_App.svg/1280px-MoMo_Logo_App.svg.png"
                                        alt="MoMo">
                                    <img src="https://cdn.tgdd.vn/2020/04/GameApp/image-180x180.png" alt="Zalo Pay">
                                </div>
                            </div>
                        </div>
                    </label>

                    <label class="pay-item">
                        <input type="radio" name="pay">

                        <div class="pay-content">
                            <div class="pay-wallet">
                                <strong>4. Thẻ tín dụng/Ghi nợ/Trả góp</strong>

                                <div class="pay-icons">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/9/98/Visa_Inc._logo_%282005%E2%80%932014%29.svg"
                                        alt="Visa">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                        alt="Mastercard">
                                </div>
                            </div>
                        </div>
                    </label>

                </div>

            </div>

            <!-- RIGHT -->
            <div class="pay-right">

                <div class="pay-invoice">

                    <div class="pay-invoice-title">
                        Tổng hoá đơn
                    </div>

                    <div class="pay-invoice-item line">
                        Sản phẩm
                    </div>

                    <div class="pay-invoice-item">
                        Thành tiền
                    </div>

                    <div class="pay-invoice-item">
                        Phí vận chuyển
                    </div>

                    <button class="pay-btn">
                        Đặt Hàng
                    </button>

                </div>

            </div>

        </div>

    </div>
</body>

</html>
